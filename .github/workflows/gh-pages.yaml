name: github pages publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      # uv 本体のバージョンは pyproject.toml の [dependency-groups] ci にピンしてあり、
      # Dependabot (uv エコシステム) がそれを bump する。ここでその値を読み取り setup-uv に渡す。
      - name: Resolve uv version
        id: uv-version
        run: |
          version=$(grep -oP '"uv==\K[0-9]+\.[0-9]+\.[0-9]+' pyproject.toml)
          if [ -z "$version" ]; then
            echo "::error::could not resolve uv version pin from pyproject.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ steps.uv-version.outputs.version }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install the project
        run: uv sync

      - name: main.py
        run: uv run main.py

      - name: Deploy
        uses: actions/upload-pages-artifact@v5
        with:
          path: feeds

  publish:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
